<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Progresso | EasyDev Academy</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="../index.html" class="logo"
          ><span class="logo-mark">&lt;/&gt;</span><span class="logo-text">EasyDev Academy</span></a
        >
        <nav class="main-nav">
          <a href="../index.html#cursos">Cursos</a>
          <a href="../pages/progresso.html">Progresso</a>
        </nav>
        <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line id="ham-top" x1="2" y1="5" x2="20" y2="5"/>
            <line id="ham-mid" x1="2" y1="11" x2="20" y2="11"/>
            <line id="ham-bot" x1="2" y1="17" x2="20" y2="17"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="container" style="padding:32px 0 80px; max-width: 720px;">
      <h1>Meu Progresso</h1>
      <p class="lesson-meta">Acompanhe seu avanço em todos os cursos e módulos.</p>

      <div id="all-progress"></div>

      <p style="margin-top:24px">
        <button id="reset" class="btn btn-ghost">Resetar progresso</button>
      </p>
    </main>

    <footer class="site-footer"><div class="container">© EasyDev Academy</div></footer>

    <script src="../js/data.js"></script>
    <script src="../js/data-modulos.js"></script>
    <script src="../js/modulo1.js"></script>
    <script>
      (function () {
        // Lê o progresso salvo em uma chave (ex.: ap_progress_m1)
        function readProgress(storageKey) {
          try {
            return JSON.parse(localStorage.getItem(storageKey) || "{}");
          } catch {
            return {};
          }
        }

        // Apenas o Curso de Portugol → Módulo 1 está realmente disponível na V1.
        // Todos os outros cursos/módulos são placeholders e devem aparecer como
        // bloqueados, sem contar para o progresso geral do usuário.
        function isAvailable(courseId, mod) {
          return courseId === "portugol" && mod.id === 1;
        }
        function getAvailableModuleData(courseId, mod) {
          if (!isAvailable(courseId, mod)) return null;
          return {
            storageKey: "ap_progress_m1",
            items: [
              ...AP.MODULE1_LESSONS.map(l => ({ key: l.slug, label: `Aula ${l.id} — ${l.title}` })),
              { key: "projeto-final", label: "Projeto Final" },
              { key: "questionario-final", label: "Questionário Final" },
              { key: "desafio", label: "Desafio de Código" },
            ],
          };
        }

        const root = document.getElementById("all-progress");
        const storageKeysToReset = ["ap_progress_m1"];

        (AP.COURSES || []).forEach(course => {
          const courseSection = document.createElement("section");
          courseSection.style.marginTop = "32px";
          courseSection.innerHTML = `<h2>${course.title}</h2>`;

          let courseDone = 0, courseTotal = 0;
          const modulesWrap = document.createElement("div");

          (course.modules || []).forEach(mod => {
            const data = getAvailableModuleData(course.id, mod);

            if (!data) {
              // Módulo bloqueado / em desenvolvimento — sem barra, sem estatísticas.
              const block = document.createElement("div");
              block.style.marginTop = "20px";
              block.style.opacity = "0.75";
              block.innerHTML = `
                <h3 style="margin:0 0 4px">Módulo ${mod.id} — ${mod.title}</h3>
                <p class="lesson-meta" style="margin:0">🚧 Em Desenvolvimento</p>
              `;
              modulesWrap.appendChild(block);
              return;
            }

            const progress = readProgress(data.storageKey);
            let done = 0;
            data.items.forEach(it => { if (progress[it.key]) done++; });
            courseDone += done;
            courseTotal += data.items.length;

            const pct = data.items.length ? Math.round((done / data.items.length) * 100) : 0;
            const block = document.createElement("div");
            block.style.marginTop = "20px";
            block.innerHTML = `
              <h3 style="margin:0 0 8px">Módulo ${mod.id} — ${mod.title}</h3>
              <div class="progress-bar"><span style="width:${pct}%"></span></div>
              <p class="lesson-meta" style="margin:6px 0 8px">${done} de ${data.items.length} concluído(s) — ${pct}%</p>
            `;
            const ul = document.createElement("ul");
            ul.className = "progress-list";
            data.items.forEach(it => {
              const isDone = !!progress[it.key];
              const li = document.createElement("li");
              if (isDone) li.classList.add("done");
              li.innerHTML = `<span class="check">✓</span><span>${it.label}</span>`;
              ul.appendChild(li);
            });
            block.appendChild(ul);
            modulesWrap.appendChild(block);
          });

          // Resumo geral do curso — apenas se houver módulos reais disponíveis.
          if (courseTotal > 0) {
            const coursePct = Math.round((courseDone / courseTotal) * 100);
            const summary = document.createElement("div");
            summary.innerHTML = `
              <div class="progress-bar"><span style="width:${coursePct}%"></span></div>
              <p class="lesson-meta" style="margin:6px 0 0">Progresso geral do curso: ${courseDone} de ${courseTotal} (${coursePct}%)</p>
            `;
            courseSection.appendChild(summary);
          } else {
            const lock = document.createElement("p");
            lock.className = "lesson-meta";
            lock.style.margin = "6px 0 0";
            lock.textContent = "🔒 Curso em desenvolvimento — em breve.";
            courseSection.appendChild(lock);
          }
          courseSection.appendChild(modulesWrap);
          root.appendChild(courseSection);
        });

        document.getElementById("reset").addEventListener("click", () => {
          if (!confirm("Tem certeza que deseja resetar o progresso de todos os cursos?")) return;
          Array.from(new Set(storageKeysToReset)).forEach(k => localStorage.removeItem(k));
          location.reload();
        });
      })();
    </script>
      <script>
      (function(){
        var btn = document.getElementById('nav-toggle');
        var nav = document.querySelector('.main-nav');
        if(!btn||!nav) return;
        btn.addEventListener('click', function(){
          var open = nav.classList.toggle('open');
          btn.setAttribute('aria-expanded', open);
        });
        // Close on link click
        nav.querySelectorAll('a').forEach(function(a){
          a.addEventListener('click', function(){ nav.classList.remove('open'); btn.setAttribute('aria-expanded','false'); });
        });
        // Close on outside click
        document.addEventListener('click', function(e){
          if(!btn.contains(e.target) && !nav.contains(e.target)){
            nav.classList.remove('open');
            btn.setAttribute('aria-expanded','false');
          }
        });
      })();
    </script>
  </body>
</html>
